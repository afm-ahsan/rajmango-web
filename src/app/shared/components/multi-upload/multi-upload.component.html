<div>
  <!-- Uploaded image thumbnails -->
  <div class="d-flex flex-wrap gap-3 mb-3" *ngIf="uploads.length">
    <div *ngFor="let u of uploads; let i = index" class="position-relative">
      <img [src]="imgUrl(u.path)" class="rounded border" style="width:80px;height:80px;object-fit:cover;" [alt]="'Image ' + (i + 1)" />
      <button type="button"
        class="btn btn-icon btn-sm btn-danger position-absolute top-0 end-0"
        style="width:22px;height:22px;padding:0;font-size:10px;"
        (click)="remove(i)"
        title="Remove">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </div>

  <!-- Add button — hidden when at limit -->
  <ng-container *ngIf="!atLimit">
    <input type="file" #fileInput style="display:none" accept="image/*"
      (change)="uploadFile(fileInput.files); fileInput.value = ''" />
    <button type="button" class="btn btn-sm btn-light-primary" (click)="fileInput.click()" [disabled]="isUploading">
      <span *ngIf="isUploading" class="spinner-border spinner-border-sm me-1" role="status"></span>
      <i *ngIf="!isUploading" class="bi bi-image me-1"></i>
      Add Image
    </button>
    <span class="text-muted fs-7 ms-2">{{ uploads.length }} / {{ maxImages }}</span>
  </ng-container>

  <!-- Limit reached message -->
  <div *ngIf="atLimit" class="d-flex align-items-center gap-2 text-warning fs-7 mt-1">
    <i class="bi bi-exclamation-triangle-fill"></i>
    Maximum {{ maxImages }} image<span *ngIf="maxImages !== 1">s</span> reached. Remove one to add another.
  </div>
</div>
