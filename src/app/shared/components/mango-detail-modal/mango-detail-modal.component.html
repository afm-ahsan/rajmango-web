<div class="modal-header">
  <h5 class="modal-title">{{ mango.name }} - Detailed View</h5>
  <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>
<div class="modal-body">
  <div class="row g-4 align-items-center">
    <div class="col-md-6">
      <img [src]="mango.image" class="img-fluid rounded" [alt]="mango.name" />
    </div>
    <div class="col-md-6">
      <h3>{{ mango.name }}</h3>
      <p><strong>Price:</strong> {{ mango.price | currency:'BDT' }}</p>
      <p>
        <strong>Availability:</strong>
        <span class="badge" [ngClass]="mango.isAvailable ? 'bg-success' : 'bg-danger'">
          {{ mango.isAvailable ? 'Available' : 'Not Available' }}
        </span>
      </p>
      <p><strong>Sweetness Level:</strong> {{ mango.sweetness }}</p>
      <div class="progress mt-2" style="height: 5px;">
        <div
          class="progress-bar bg-warning"
          role="progressbar"
          [style.width]="getSweetnessWidth(mango.sweetness)"
        ></div>
      </div>
      <p class="mt-3">🍋 More details can go here: origin, seasonality, texture, nutritional info, etc.</p>
    </div>
  </div>
</div>
<div class="modal-footer">
    <button class="btn btn-outline-secondary" (click)="activeModal.close()">Close</button>
    <button class="btn btn-primary" [disabled]="!mango.isAvailable" (click)="proceedToOrder()">
        Proceed to Order
    </button>
</div>
