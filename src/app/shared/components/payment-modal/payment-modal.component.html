<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4 whiteFontColor" id="example-modal-sizes-title-lg">
            <ng-container class="font-weight-bold"><strong>Checkout/Billing</strong></ng-container>
        </div>
        <!-- <div class="d-flex align-items-center mt-10 mb-5">
            <div class="border-bottom border-gray-300 mw-50 w-100"></div>
            <span class="fw-bold text-gray-400 fs-7 mx-2">Checkout OR Billing</span>
            <div class="border-bottom border-gray-300 mw-50 w-100"></div>
        </div> -->
    </div>
    <div class="overlay overlay-block cursor-default modal-body">
        <ng-container *ngIf="isLoading">
            <div class="overlay-layer bg-transparent">
                <div class="spinner spinner-lg spinner-success"></div>
            </div>
        </ng-container>
        <ng-container *ngIf="paymentModel">
            <form action="#" class="form form-label-right" [formGroup]="formGroup">
                <!-- Payment Method -->
                <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Payment Method:</b></label>
                    <div class="col-8">
                        <select class="form-control form-select"
                            formControlName="paymentMethod" 
                            (change)="onMethodChange($event)">
                            <option value="0">Select payment method</option>
                            <option *ngFor="let ddlItem of ddlPayemntMethods" value="{{ ddlItem.id }}">
                                {{ddlItem.label }}
                            </option>
                        </select>
                    </div>
                </div>
                <!-- Recipient Amount -->
                <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Recipient Amount:</b></label>
                    <div class="col-8">
                        <input type="number" class="form-control" placeholder="Recipient Amount" formControlName="recipientAmount" />
                    </div>
                </div>
                <!-- Subtotal -->
                <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Subtotal:</b></label>
                    <div class="col-8">
                        <input type="number" min="0" class="form-control" placeholder="Subtotal" formControlName="subtotal" />
                    </div>
                </div>
                <!-- Discount Amount -->
                <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Discount Amount:</b></label>
                    <div class="col-8">
                        <input type="number" min="0" class="form-control" placeholder="Discount Amount" formControlName="discountAmount" />
                    </div>
                </div>
                <!-- Vat Amount -->
                <!-- <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Vat Amount:</b></label>
                    <div class="col-8">
                        <input type="number" min="0" class="form-control" placeholder="Vat Amount" formControlName="vatAmount" />
                    </div>
                </div> -->
                <!-- Total Payable -->
                <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Total Payable:</b></label>
                    <div class="col-8">
                        <input type="number" min="0" class="form-control" placeholder="Total Payable" formControlName="totalPayable" />
                    </div>
                </div>
                <!-- Balance -->
                <div class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Balance:</b></label>
                    <div class="col-8">
                        <input type="number" min="0" class="form-control" placeholder="Balance" formControlName="balance" />
                    </div>
                </div>
                <div *ngIf="isCashPayment" class="row mt-2">
                    <div class="col-5">
                        <!-- Cash Amount -->
                        <div class="form-group row fv-row mb-7">
                            <label class="form-label fw-bolder text-dark fs-6">Cash Amount:</label>
                            <input type="number" min="0" class="form-control" placeholder="Cash Amount" formControlName="cashAmount"
                                (input)="onCashAmtChange($event)" />
                        </div>
                    </div>
                    <div class="col-5 offset-2">
                        <!-- Change Amount -->
                        <div class="form-group row fv-row mb-7">
                            <label class="form-label fw-bolder text-dark fs-6">Change Amount:</label>
                            <input type="number" min="0" class="form-control" placeholder="Change Amount" formControlName="changeAmount" />
                        </div>
                    </div>
                </div>
                <div *ngIf="isMobileWallet" class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Transaction Id:</b></label>
                    <div class="col-8">
                        <input type="text" class="form-control" placeholder="Transaction Id" formControlName="walletTransactionId" />
                    </div>
                </div>
                <div *ngIf="isCardPayment" class="form-group row mt-2">
                    <label class="col-4 col-form-label text-lg-right"><b>Card Type:</b></label>
                    <div class="col-8">
                        <input type="text" class="form-control" placeholder="Cart Type" formControlName="cardType" />
                    </div>
                </div>
            </form>
        </ng-container>
    </div>
    <div class="modal-footer">
        <button class="btn btn-light btn-sm btn-elevate me-3" (click)="modal.dismiss()">Cancel</button>
        <button class="btn btn-primary btn-sm btn-elevate" (click)="confirmPayment()" [disabled]="formGroup.invalid">Confirm</button>
    </div>
</div>
