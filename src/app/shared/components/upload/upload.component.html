<div class="row">
    <div class="col-6">
      <input type="file" #file placeholder="Choose file" (change)="uploadFile(file.files)" style="display:none;">
      <!-- <button type="button" class="btn btn-success" (click)="file.click()">Upload File</button> -->
      <button class="btn-light" (click)="file.click()">Upload File</button>
    </div>
    <div class="col-6">
      <!-- <span class="upload" *ngIf="progress > 0">
        {{progress}}%
      </span> -->
      <span *ngIf="imagePath.length" class="text-success">
        {{message}}
      </span>
      <span *ngIf="!imagePath.length" class="text-danger">
        {{message}}
      </span>
    </div>

    <div *ngIf="imagePath?.length">
        <div class="overflow-hidden mt-2">
            <img [src]="createImgPath(imagePath)" alt="Category Image" class="rounded preview-image" />
        </div>
        <div class="mt-2">
            <a href="javascript: void(0)" (click)="deleteFile()">Remove file</a>
        </div>
    </div>
</div>
