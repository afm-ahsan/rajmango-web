<div class="modal-header">
    <div class="modal-title h4 whiteFontColor">{{title}}</div>
</div>
<div class="modal-body">
    <ng-container>
        <span>{{message}}</span>
    </ng-container>
</div>

<div class="modal-footer">
    <div>
        <button type="button" class="btn btn-light btn-sm btn-elevate me-3" (click)="modal.dismiss()">
            Cancel
        </button>&nbsp;
        <button type="button" class="btn btn-primary btn-sm btn-elevate" (click)="confirm()">
            Confirm
        </button>
    </div>
</div>
