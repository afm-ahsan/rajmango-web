<div class="d-flex flex-column align-items-center justify-content-center text-center py-10 bg-light rounded shadow-sm w-100">
  <i class="bi {{ icon }} fs-1 mb-3 text-primary"></i>

  <div class="fs-4 fw-semibold text-dark mb-1">
    {{ title }}
  </div>

  <div class="fs-7 subtle-message mb-4">
    {{ message }}
  </div>

  <button
    *ngIf="buttonText"
    type="button"
    class="btn btn-outline-primary btn-sm px-4"
    (click)="onClick()"
  >
    <i class="bi bi-plus-circle me-1"></i> {{ buttonText }}
  </button>
</div>
