<ng-container *ngIf="user$ | async as user">
  <!-- User Info -->
  <div class="menu-item px-3">
    <div class="menu-content d-flex align-items-center px-3">
      <div class="symbol symbol-50px me-5">
        <img [src]="createImgPath(user.pic)" alt="User Avatar" class="img-fluid rounded-circle" />
      </div>
      <div class="d-flex flex-column">
        <span class="fw-bold fs-5 d-flex align-items-center">
          {{ user.firstName }} {{ user.lastName }}
          <!-- <span class="badge badge-light-success fw-bold fs-8 px-2 py-1 ms-2">Pro</span> -->
        </span>
        <span class="text-muted fs-7">{{ user.email }}</span>
      </div>
    </div>
  </div>

  <div class="separator my-2"></div>

  <!-- Profile -->
  <!-- <div class="menu-item px-5">
    <a routerLink="/profile" class="menu-link px-5">
      <span class="menu-title">My Profile</span>
    </a>
  </div> -->

  <!-- Settings -->
  <!-- <div class="menu-item px-5">
    <a routerLink="/settings" class="menu-link px-5">
      <span class="menu-title">Settings</span>
    </a>
  </div> -->

  <!-- Profile -->
  <div class="menu-item px-5">
    <a routerLink="/customer-profile/profile" class="menu-link px-5">
      <span class="menu-title">My Profile</span>
    </a>
  </div>

  <!-- Orders -->
  <div class="menu-item px-5">
    <a routerLink="/orders/order-list" class="menu-link px-5">
      <span class="menu-title">My Orders</span>
    </a>
  </div>

  <!-- Support -->
  <!-- <div class="menu-item px-5">
    <a routerLink="/support" class="menu-link px-5">
      <span class="menu-title">Support</span>
    </a>
  </div> -->

  <div class="separator my-2"></div>

  <!-- Logout -->
  <div class="menu-item px-5">
    <a (click)="logout()" class="menu-link px-5 cursor-pointer">
      <span class="menu-title">Sign Out</span>
    </a>
  </div>
</ng-container>
