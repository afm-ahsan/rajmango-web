<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4 whiteFontColor" id="example-modal-sizes-title-lg">
            <ng-container *ngIf="roleDto">
                <ng-container *ngIf="roleDto.id" class="font-weight-bold">
                    <strong>Role Details</strong>
                </ng-container>
            </ng-container>
        </div>
    </div>
    <div class="overlay overlay-block cursor-default modal-body">
        <ng-container *ngIf="isLoading">
            <div class="overlay-layer bg-transparent">
                <div class="spinner spinner-lg spinner-success"></div>
            </div>
        </ng-container>
        <ng-container *ngIf="roleDto">
            <form action="#" class="form form-label-right">
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Name:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ roleDto.name }}</label>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Description:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ roleDto.description }}</label>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Is Active:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ roleDto.isActive }}</label>
                    </div>
                </div>
            </form>
        </ng-container>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()"><i
                class="fas fa-window-close"></i>Close</button>
    </div>
</div>
