<!--begin::Post-->
<div class="post d-flex flex-column-fluid" id="kt_post">
    <!--begin::Container-->
    <div id="kt_content_container" class="container-xxl">
        <!--begin::Card-->
        <div class="card">
            <!--begin::Card header-->
            <div class="card-header border-0 pt-6">
                <!--begin::Card title-->
                <div class="card-title">
                    <!--begin::Search-->
                    <div class="d-flex align-items-center position-relative my-1">
                        <!--begin::Svg Icon | path: icons/duotune/general/gen021.svg-->
                        <span class="svg-icon svg-icon-1 position-absolute ms-6"
                            [inlineSVG]="'./assets/media/icons/duotune/general/gen021.svg'" [cacheSVG]="true">
                        </span>
                        <!--end::Svg Icon-->
                        <input type="text" data-kt-user-role-filter="search"
                            class="form-control form-control-solid w-250px ps-14" placeholder="Search role" />
                    </div>
                    <!--end::Search-->
                </div>
                <!--begin::Card title-->
                <!--begin::Card toolbar-->
                <div class="card-toolbar">
                    <!--begin::Toolbar-->
                    <div class="d-flex justify-content-end" data-kt-user-role-toolbar="base">
                        <!--begin::Filter-->
                        <!--<button type="button" class="btn btn-light-primary me-3" data-kt-menu-trigger="click"
                            data-kt-menu-placement="bottom-end">-->
                            <!--begin::Svg Icon | path: icons/duotune/general/gen031.svg-->
                            <!--<span class="svg-icon svg-icon-2"
                                [inlineSVG]="'./assets/media/icons/duotune/general/gen031.svg'" [cacheSVG]="true">
                            </span>-->
                            <!--end::Svg Icon--><!--Filter</button>-->
                        <!--begin::Menu 1-->
                        <div class="menu menu-sub menu-sub-dropdown w-300px w-md-325px" data-kt-menu="true">
                            <!--begin::Header-->
                            <div class="px-7 py-5">
                                <div class="fs-5 text-dark fw-bolder">Filter Options</div>
                            </div>
                            <!--end::Header-->
                            <!--begin::Separator-->
                            <div class="separator border-gray-200"></div>
                            <!--end::Separator-->
                            <!--begin::Content-->
                            <div class="px-7 py-5" data-kt-user-role-filter="form">
                                <!--begin::Input group-->
                                <div class="mb-10">
                                    <label class="form-label fs-6 fw-bold">Role:</label>
                                    <select class="form-select form-select-solid fw-bolder" data-kt-select2="true"
                                        data-placeholder="Select option" data-allow-clear="true"
                                        data-kt-user-role-filter="role" data-hide-search="true">
                                        <option></option>
                                        <option value="tblName">Name</option>
                                        <option value="isActive">Active</option>
                                    </select>
                                </div>
                                <!--end::Input group-->
                                <!--begin::Actions-->
                                <div class="d-flex justify-content-end">
                                    <button type="reset"
                                        class="btn btn-light btn-active-light-primary fw-bold me-2 px-6"
                                        data-kt-menu-dismiss="true" data-kt-user-role-filter="reset">Reset</button>
                                    <button type="submit" class="btn btn-primary fw-bold px-6"
                                        data-kt-menu-dismiss="true" data-kt-user-role-filter="filter">Apply</button>
                                </div>
                                <!--end::Actions-->
                            </div>
                            <!--end::Content-->
                        </div>
                        <!--end::Menu 1-->
                        <!--end::Filter-->
                        <!--begin::Export-->
                        <!--<button type="button" class="btn btn-light-primary me-3" data-bs-toggle="modal"
                            data-bs-target="#kt_modal_export">-->
                            <!--begin::Svg Icon | path: icons/duotune/arrows/arr078.svg-->
                            <!--<span class="svg-icon svg-icon-2"
                                [inlineSVG]="'./assets/media/icons/duotune/arrows/arr078.svg'" [cacheSVG]="true">
                            </span>-->
                            <!--end::Svg Icon--><!--Export</button>-->
                        <!--end::Export-->
                        <!--begin::Add user-->
                        <button type="button" class="btn btn-primary" (click)="create()">
                            <!--begin::Svg Icon | path: icons/duotune/arrows/arr075.svg-->
                            <span class="svg-icon svg-icon-2"
                                [inlineSVG]="'./assets/media/icons/duotune/arrows/arr075.svg'" [cacheSVG]="true">
                            </span>
                            <!--end::Svg Icon-->Add Role</button>
                        <!--end::Add user-->
                    </div>
                    <!--end::Toolbar-->
                </div>
                <!--end::Card toolbar-->
            </div>
            <!--end::Card header-->
            <!--begin::Card body-->
            <div class="card-body py-4">
                <div class="table-responsive">
                    <!--begin::Role-->
                    <table class="table table-striped table-hover align-middle fs-6 gy-5" id="kt_role">
                        <!--begin::Role head-->
                        <thead>
                            <!--begin::Role row-->
                            <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                                <!--<th class="w-10px pe-2">
                                    <div class="form-check form-check-sm form-check-custom form-check-solid me-3">
                                        <input class="form-check-input" type="checkbox" data-kt-check="true"
                                            data-kt-check-target="#kt_role .form-check-input" value="1" />
                                    </div>
                                </th>-->
                                <th>Name</th>
                                <th>Description</th>
                                <!-- <th>Assigned Users</th> -->
                                <th>Active</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            <!--end::Role row-->
                        </thead>
                        <!--end::Role head-->
                        <!--begin::Role body-->
                        <tbody class="text-gray-600 fw-bold">
                            <!--begin::Role row-->
                            <tr *ngFor="let role of roles">
                                <!--begin::Checkbox-->
                                <!--<td>
                                    <div class="form-check form-check-sm form-check-custom form-check-solid">
                                        <input class="form-check-input" type="checkbox" value="1" />
                                    </div>
                                </td>-->
                                <!--end::Checkbox-->
                                <td>
                                    <div class="d-flex flex-column">
                                        <a href="" class="text-gray-800 text-hover-primary mb-1">{{role.name}}</a>
                                    </div>
                                </td>
                                <td>{{role.description}}</td>
                                <!-- <td>{{1}}</td> -->
                                <td>{{role.isActive}}</td>
                                <!--begin::Action=-->
                                <td class="text-center">
                                    <a href="#" class="btn btn-light btn-active-light-primary btn-sm"
                                        data-kt-menu-trigger="click" data-kt-menu-placement="bottom-end">Actions
                                        <!--begin::Svg Icon | path: icons/duotune/arrows/arr072.svg-->
                                        <span class="svg-icon svg-icon-5 m-0"
                                            [inlineSVG]="'./assets/media/icons/duotune/arrows/arr072.svg'"
                                            [cacheSVG]="true">
                                        </span>
                                        <!--end::Svg Icon--></a>
                                    <!--begin::Menu-->
                                    <div class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-bold fs-7 w-125px py-4"
                                        data-kt-menu="true">
                                        <!--begin::Menu item-->
                                        <div class="menu-item px-3">
                                            <a href="javascript:" class="menu-link px-3"
                                                (click)="edit(role.id)">Edit</a>
                                        </div>
                                        <div class="menu-item px-3">
                                            <a href="javascript:" class="menu-link px-3"
                                                (click)="view(role.id)">View</a>
                                        </div>
                                        <div class="menu-item px-3">
                                            <a href="javascript:" class="menu-link px-3"
                                                (click)="delete(role.id)">Delete</a>
                                        </div>
                                        <!--end::Menu item-->
                                    </div>
                                    <!--end::Menu-->
                                </td>
                                <!--end::Action=-->
                            </tr>
                            <!--end::Role row-->
                        </tbody>
                        <!--end::Role body-->
                    </table>
                    <!--end::Role-->
                </div>
                <app-pagination [collectionSize]="totalCount" [pageSize]="filter.pageSize"
                    [pageNumber]="filter.pageNumber" (pageChange)="pageChanged($event)"
                    (pageSizeChange)="pageSizeChanged($event)">
                </app-pagination>
            </div>
            <!--end::Card body-->
            <div class="card-body">
                <ng-container *ngIf="!roles.length && !isLoading">
                    <app-data-loading-empty></app-data-loading-empty>
                </ng-container>
            </div>
        </div>
        <!--end::Card-->
    </div>
    <!--end::Container-->
</div>
<!--end::Post-->
