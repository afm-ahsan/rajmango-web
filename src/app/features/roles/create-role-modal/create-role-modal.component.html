<div class="modal-content">

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <div class="modal-header" [class.bg-primary]="!isViewMode" [class.bg-light]="isViewMode">
    <h5 class="modal-title fw-bold mb-0" [class.text-white]="!isViewMode" [class.text-dark]="isViewMode">
      {{ modalTitle }}
    </h5>
    <button type="button" class="btn-close" [class.btn-close-white]="!isViewMode" (click)="modal.dismiss()"></button>
  </div>

  <!-- ── Body ─────────────────────────────────────────────────────── -->
  <div class="modal-body p-0">

    <!--
      BODY LOADER — shown only while fetching role data for edit/view.
      Never shown at the same time as the button loader.
    -->
    <ng-container *ngIf="isLoading">
      <div class="d-flex flex-column align-items-center justify-content-center py-12">
        <span class="spinner-border text-primary mb-3" role="status"></span>
        <span class="text-muted fs-7">Loading role details…</span>
      </div>
    </ng-container>

    <ng-container *ngIf="!isLoading && formGroup">
      <form [formGroup]="formGroup" class="form">

        <!-- Role metadata -->
        <div class="p-6 border-bottom">
          <div class="row g-4">

            <!-- Name -->
            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold" [class.required]="!isViewMode">Role Name</label>
              <input
                type="text"
                class="form-control form-control-solid"
                placeholder="e.g. Order Manager"
                formControlName="name"
                [class.is-invalid]="isControlInvalid('name')"
                [class.is-valid]="isControlValid('name')" />
              <div class="invalid-feedback" *ngIf="controlHasError('required', 'name')">Role name is required.</div>
              <div class="invalid-feedback" *ngIf="controlHasError('minlength', 'name')">Minimum 3 characters.</div>
              <div class="invalid-feedback" *ngIf="controlHasError('maxlength', 'name')">Maximum 50 characters.</div>
            </div>

            <!-- Description -->
            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold">Description</label>
              <input
                type="text"
                class="form-control form-control-solid"
                placeholder="Optional description"
                formControlName="description" />
            </div>

            <!-- Is Active -->
            <div class="col-12">
              <div class="form-check form-check-sm form-check-custom form-check-solid">
                <input type="checkbox" class="form-check-input" formControlName="isActive" id="roleIsActive" />
                <label class="form-check-label fw-semibold" for="roleIsActive">Active</label>
              </div>
            </div>

          </div>
        </div>

        <!-- Permissions header -->
        <div class="d-flex align-items-center justify-content-between px-6 py-3 border-bottom bg-light-subtle">
          <span class="fw-bold text-dark fs-6">
            Permissions
            <span *ngIf="isViewMode" class="badge badge-light-primary ms-2 fs-8">Read-only</span>
          </span>
          <!-- Global select-all (edit/create only) -->
          <div class="form-check form-check-sm form-check-custom form-check-solid" *ngIf="!isViewMode">
            <input
              type="checkbox"
              class="form-check-input"
              id="selectAll"
              (change)="onCheckAll($event)"
              [checked]="isAllChecked"
              [indeterminate]="isAllIndeterminate" />
            <label class="form-check-label fw-semibold text-gray-600 fs-7" for="selectAll">Select All</label>
          </div>
        </div>

        <!-- Permission tree -->
        <div class="permission-scroll-area">
          <div *ngFor="let group of permissionList; let lastGroup = last" class="permission-group">

            <!-- Group header -->
            <div class="permission-group-header d-flex align-items-center gap-3">
              <ng-container *ngIf="!isViewMode">
                <div class="form-check form-check-sm form-check-custom form-check-solid">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    [id]="'group-' + group.area"
                    (change)="onGroupCheckAll(group, $event)"
                    [checked]="isGroupAllChecked(group)"
                    [indeterminate]="isGroupIndeterminate(group)" />
                  <label class="form-check-label fw-bold text-uppercase text-primary fs-8 ls-1"
                         [for]="'group-' + group.area">
                    {{ group.area }}
                  </label>
                </div>
              </ng-container>
              <ng-container *ngIf="isViewMode">
                <span class="fw-bold text-uppercase text-primary fs-8 ls-1">{{ group.area }}</span>
              </ng-container>
            </div>

            <!-- Features in group -->
            <div *ngFor="let feature of group.featureModels; let lastFeature = last"
                 class="permission-feature-row"
                 [class.border-bottom-0]="lastFeature && lastGroup">

              <!-- Feature label -->
              <div class="permission-feature-label">
                <ng-container *ngIf="!isViewMode">
                  <div class="form-check form-check-sm form-check-custom form-check-solid">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      [id]="'feat-' + feature.id"
                      (change)="onFeatureChange(feature, $event)"
                      [checked]="feature.hasAccess"
                      [indeterminate]="isFeatureIndeterminate(feature)" />
                    <label class="form-check-label fw-semibold text-gray-800 fs-7" [for]="'feat-' + feature.id">
                      {{ feature.title }}
                    </label>
                  </div>
                </ng-container>
                <ng-container *ngIf="isViewMode">
                  <span class="fw-semibold fs-7"
                        [class.text-gray-800]="feature.hasAccess"
                        [class.text-gray-400]="!feature.hasAccess">
                    {{ feature.title }}
                  </span>
                </ng-container>
              </div>

              <!-- Action chips (edit/create mode) -->
              <div class="permission-actions">
                <ng-container *ngIf="!isViewMode">
                  <div *ngFor="let action of feature.actionModels"
                       class="permission-action-chip"
                       [class.chip-active]="action.hasAccess">
                    <div class="form-check form-check-sm form-check-custom form-check-solid">
                      <input
                        type="checkbox"
                        class="form-check-input"
                        [id]="'act-' + feature.id + '-' + action.id"
                        (change)="onActionChange(feature, action.id, $event)"
                        [checked]="action.hasAccess" />
                      <label class="form-check-label text-gray-600 fs-8"
                             [for]="'act-' + feature.id + '-' + action.id">
                        {{ action.action }}
                      </label>
                    </div>
                  </div>
                </ng-container>

                <!-- View mode: granted actions as badges, none = muted label -->
                <ng-container *ngIf="isViewMode">
                  <ng-container *ngFor="let action of feature.actionModels">
                    <span *ngIf="action.hasAccess" class="badge badge-light-success fs-8 me-1">
                      {{ action.action }}
                    </span>
                  </ng-container>
                  <span *ngIf="!feature.hasAccess" class="text-muted fs-8 fst-italic">No access</span>
                </ng-container>
              </div>

            </div>
            <!-- /feature row -->

          </div>
          <!-- /group -->
        </div>
        <!-- /permission tree -->

      </form>
    </ng-container>

  </div>
  <!-- /modal-body -->

  <!-- ── Footer ───────────────────────────────────────────────────── -->
  <div class="modal-footer">
    <button type="button" class="btn btn-light" [disabled]="isSaving" (click)="modal.dismiss()">
      {{ isViewMode ? 'Close' : 'Cancel' }}
    </button>

    <!--
      SAVE BUTTON — shown only in create/edit mode.
      Button spinner (isSaving) is the ONLY loader during submit.
      Body loader (isLoading) is never true at the same time as isSaving.
    -->
    <button
      *ngIf="!isViewMode"
      type="button"
      class="btn btn-primary"
      (click)="save()"
      [disabled]="formGroup?.invalid || isSaving || isLoading">
      <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      {{ isSaving ? (roleDto.id ? 'Updating…' : 'Creating…') : 'Save Role' }}
    </button>
  </div>

</div>
