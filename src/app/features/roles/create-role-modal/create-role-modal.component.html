<div class="modal-content">

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <div class="modal-header bg-primary">
    <h5 class="modal-title text-white fw-bold mb-0">
      <ng-container *ngIf="roleDto.id">Edit Role</ng-container>
      <ng-container *ngIf="!roleDto.id">Add Role</ng-container>
    </h5>
    <button type="button" class="btn-close btn-close-white" (click)="modal.dismiss()"></button>
  </div>

  <!-- ── Body ─────────────────────────────────────────────────────── -->
  <div class="modal-body p-0">

    <ng-container *ngIf="isLoading">
      <div class="d-flex justify-content-center py-10">
        <span class="spinner-border text-primary" role="status"></span>
      </div>
    </ng-container>

    <ng-container *ngIf="!isLoading && roleDto">
      <form [formGroup]="formGroup" class="form">

        <!-- Role metadata -->
        <div class="p-6 border-bottom">
          <div class="row g-4">

            <!-- Name -->
            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold required">Role Name</label>
              <input
                type="text"
                class="form-control form-control-solid"
                placeholder="e.g. Order Manager"
                formControlName="name"
                [class.is-invalid]="isControlInvalid('name')"
                [class.is-valid]="isControlValid('name')" />
              <div class="invalid-feedback" *ngIf="controlHasError('required', 'name')">Role name is required.</div>
              <div class="invalid-feedback" *ngIf="controlHasError('minlength', 'name')">Minimum 3 characters.</div>
              <div class="invalid-feedback" *ngIf="controlHasError('maxlength', 'name')">Maximum 50 characters.</div>
            </div>

            <!-- Description -->
            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold">Description</label>
              <input
                type="text"
                class="form-control form-control-solid"
                placeholder="Optional description"
                formControlName="description" />
            </div>

            <!-- Is Active -->
            <div class="col-12">
              <div class="form-check form-check-sm form-check-custom form-check-solid">
                <input type="checkbox" class="form-check-input" formControlName="isActive" id="roleIsActive" />
                <label class="form-check-label fw-semibold" for="roleIsActive">Active</label>
              </div>
            </div>

          </div>
        </div>

        <!-- Permissions header with global select-all -->
        <div class="d-flex align-items-center justify-content-between px-6 py-3 border-bottom bg-light-subtle">
          <span class="fw-bold text-dark fs-6">Permissions</span>
          <div class="form-check form-check-sm form-check-custom form-check-solid">
            <input
              type="checkbox"
              class="form-check-input"
              id="selectAll"
              (change)="onCheckAll($event)"
              [checked]="isAllChecked"
              [indeterminate]="isAllIndeterminate" />
            <label class="form-check-label fw-semibold text-gray-600 fs-7" for="selectAll">Select All</label>
          </div>
        </div>

        <!-- Permission tree -->
        <div class="permission-scroll-area">
          <div *ngFor="let group of permissionList; let lastGroup = last" class="permission-group">

            <!-- Group header -->
            <div class="permission-group-header d-flex align-items-center gap-3">
              <div class="form-check form-check-sm form-check-custom form-check-solid">
                <input
                  type="checkbox"
                  class="form-check-input"
                  [id]="'group-' + group.area"
                  (change)="onGroupCheckAll(group, $event)"
                  [checked]="isGroupAllChecked(group)"
                  [indeterminate]="isGroupIndeterminate(group)" />
                <label class="form-check-label fw-bold text-uppercase text-primary fs-8 ls-1"
                       [for]="'group-' + group.area">
                  {{ group.area }}
                </label>
              </div>
            </div>

            <!-- Features in group -->
            <div *ngFor="let feature of group.featureModels; let lastFeature = last"
                 class="permission-feature-row"
                 [class.border-bottom-0]="lastFeature && lastGroup">

              <!-- Feature checkbox -->
              <div class="permission-feature-label">
                <div class="form-check form-check-sm form-check-custom form-check-solid">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    [id]="'feat-' + feature.id"
                    (change)="onFeatureChange(feature, $event)"
                    [checked]="feature.hasAccess"
                    [indeterminate]="isFeatureIndeterminate(feature)" />
                  <label class="form-check-label fw-semibold text-gray-800 fs-7" [for]="'feat-' + feature.id">
                    {{ feature.title }}
                  </label>
                </div>
              </div>

              <!-- Action chips -->
              <div class="permission-actions">
                <div *ngFor="let action of feature.actionModels"
                     class="permission-action-chip"
                     [class.chip-active]="action.hasAccess">
                  <div class="form-check form-check-sm form-check-custom form-check-solid">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      [id]="'act-' + feature.id + '-' + action.id"
                      (change)="onActionChange(feature, action.id, $event)"
                      [checked]="action.hasAccess" />
                    <label class="form-check-label text-gray-600 fs-8"
                           [for]="'act-' + feature.id + '-' + action.id">
                      {{ action.action }}
                    </label>
                  </div>
                </div>
              </div>

            </div>
            <!-- /feature -->

          </div>
          <!-- /group -->
        </div>
        <!-- /permission tree -->

      </form>
    </ng-container>

  </div>
  <!-- /modal-body -->

  <!-- ── Footer ───────────────────────────────────────────────────── -->
  <div class="modal-footer">
    <button type="button" class="btn btn-light" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="save()" [disabled]="formGroup.invalid">
      Save Role
    </button>
  </div>

</div>
