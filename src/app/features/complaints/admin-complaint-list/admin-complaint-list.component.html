<!--begin::Complaint List-->
<div class="post d-flex flex-column-fluid" id="kt_complaints">
  <div id="kt_content_container" class="container-xxl">
    <div class="card">

      <!--begin::Header-->
      <div class="card-header border-0 pt-6 justify-content-between align-items-center gap-3">
        <div class="card-title">
          <h3 class="card-label fw-bold fs-3 mb-0">All Complaints</h3>
        </div>
      </div>
      <!--end::Header-->

      <!--begin::Loading-->
      <div class="card-body d-flex justify-content-center align-items-center" *ngIf="isLoading" style="min-height: 200px;">
        <span class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </span>
      </div>
      <!--end::Loading-->

      <!--begin::Body-->
      <div class="card-body py-4" *ngIf="!isLoading && complaints.length > 0">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle fs-6 gy-5">
            <thead>
              <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                <th>Order #</th>
                <th>Customer</th>
                <th>Category</th>
                <th>Description</th>
                <th>Status</th>
                <th>Date</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody class="text-gray-600 fw-semibold">
              <tr *ngFor="let c of complaints">
                <td class="fw-bold">{{ c.orderNumber }}</td>
                <td>{{ c.customerName }}</td>
                <td>{{ getCategoryLabel(c.category) }}</td>
                <td class="mw-200px text-truncate">{{ c.description }}</td>
                <td>
                  <span class="badge" [ngClass]="getStatusBadge(c.status)">
                    {{ getStatusLabel(c.status) }}
                  </span>
                </td>
                <td>{{ c.createdAt | date:'dd MMM yyyy' }}</td>
                <td class="text-center">
                  <button type="button" class="btn btn-sm btn-light-primary" (click)="openUpdateStatus(c)">
                    <i class="bi bi-pencil-square me-1"></i>Update Status
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <!--end::Body-->

      <!--begin::Empty-->
      <div class="card-body" *ngIf="!isLoading && !complaints.length">
        <app-data-empty
          icon="bi-exclamation-triangle"
          title="No Complaints Found"
          message="Customer complaints will appear here once submitted.">
        </app-data-empty>
      </div>
      <!--end::Empty-->

    </div>
  </div>
</div>
<!--end::Complaint List-->
