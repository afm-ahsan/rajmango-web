<div class="modal-header">
  <h5 class="modal-title fw-bold">Submit a Complaint</h5>
  <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
</div>

<div class="modal-body">
  <ng-container *ngIf="orderNumber">
    <p class="text-muted mb-4">Order: <strong>{{ orderNumber }}</strong></p>
  </ng-container>

  <form [formGroup]="form">

    <ng-container *ngIf="!orderId">
      <div class="mb-4">
        <label class="form-label fw-semibold required">Order ID</label>
        <input type="number" class="form-control form-control-solid" formControlName="orderId" placeholder="Enter your order ID" />
        <div *ngIf="form.get('orderId')?.touched && form.get('orderId')?.invalid" class="text-danger fs-7 mt-1">A valid order ID is required.</div>
      </div>
    </ng-container>

    <div class="mb-4">
      <label class="form-label fw-semibold required">Category</label>
      <select class="form-select form-select-solid" formControlName="category">
        <option *ngFor="let opt of categoryOptions" [value]="opt.value">{{ opt.label }}</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold required">Description</label>
      <textarea class="form-control form-control-solid" rows="4" formControlName="description" placeholder="Describe your issue..."></textarea>
      <div *ngIf="form.get('description')?.touched && form.get('description')?.hasError('required')" class="text-danger fs-7 mt-1">Description is required.</div>
      <div *ngIf="form.get('description')?.hasError('maxlength')" class="text-danger fs-7 mt-1">Description must be under 1000 characters.</div>
    </div>

  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-light" (click)="modal.dismiss()">Cancel</button>
  <button type="button" class="btn btn-danger" (click)="save()" [disabled]="isSaving">
    <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
    Submit Complaint
  </button>
</div>
