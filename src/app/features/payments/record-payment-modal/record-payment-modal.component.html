<div class="modal-content">
  <div class="modal-header">
    <h4 class="modal-title whiteFontColor">
      <strong>Record Payment</strong>
    </h4>
  </div>

  <div class="modal-body">
    <form [formGroup]="form" class="form form-label-right">

      <!-- Order ID -->
      <div class="form-group mt-3">
        <label><b>Order ID <span class="text-danger">*</span></b></label>
        <input type="number" formControlName="orderId" class="form-control"
          [class.is-invalid]="isInvalid('orderId')" placeholder="Enter order ID" />
        <div class="invalid-feedback" *ngIf="hasError('orderId', 'required')">Order ID is required.</div>
        <div class="invalid-feedback" *ngIf="hasError('orderId', 'min')">Order ID must be a valid number.</div>
      </div>

      <!-- Paid Amount -->
      <div class="form-group mt-3">
        <label><b>Paid Amount <span class="text-danger">*</span></b></label>
        <input type="number" formControlName="paidAmount" class="form-control"
          [class.is-invalid]="isInvalid('paidAmount')" placeholder="0.00" step="0.01" />
        <div class="invalid-feedback" *ngIf="hasError('paidAmount', 'required')">Paid amount is required.</div>
        <div class="invalid-feedback" *ngIf="hasError('paidAmount', 'min')">Amount must be greater than zero.</div>
      </div>

      <!-- Payment Method -->
      <div class="form-group mt-3">
        <label><b>Payment Method <span class="text-danger">*</span></b></label>
        <select formControlName="paymentMethod" class="form-control form-select"
          [class.is-invalid]="isInvalid('paymentMethod')">
          <option value="0">Select Method</option>
          <option *ngFor="let opt of paymentMethodOptions" [value]="opt.id">{{ opt.label }}</option>
        </select>
        <div class="invalid-feedback" *ngIf="isInvalid('paymentMethod')">Payment method is required.</div>
      </div>

      <!-- Transaction ID -->
      <div class="form-group mt-3">
        <label><b>Transaction ID</b></label>
        <input type="text" formControlName="transactionId" class="form-control"
          placeholder="Optional — bKash/bank transaction reference" />
      </div>

    </form>
  </div>

  <div class="modal-footer">
    <div class="d-flex justify-content-end gap-3">
      <button type="button" class="btn btn-light border shadow-sm px-4" (click)="cancel()">
        <i class="bi bi-x-lg"></i> Cancel
      </button>
      <button type="button" class="btn btn-primary shadow-sm px-4"
        [disabled]="isLoading" (click)="save()">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
        <i *ngIf="!isLoading" class="bi bi-save"></i> Save
      </button>
    </div>
  </div>
</div>
