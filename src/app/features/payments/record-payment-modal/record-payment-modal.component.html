<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">Record Payment</h2>
    <button type="button" class="btn-close" (click)="cancel()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <form [formGroup]="form">
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Order ID</label>
          <input type="number" class="form-control form-control-solid" formControlName="orderId"
            [class.is-invalid]="isInvalid('orderId')" placeholder="Enter order ID" />
          <div *ngIf="hasError('orderId', 'required')" class="text-danger fs-7 mt-1">Order ID is required.</div>
          <div *ngIf="hasError('orderId', 'min')" class="text-danger fs-7 mt-1">Order ID must be a valid number.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Paid Amount</label>
          <input type="number" class="form-control form-control-solid" formControlName="paidAmount"
            [class.is-invalid]="isInvalid('paidAmount')" placeholder="0.00" step="0.01" />
          <div *ngIf="hasError('paidAmount', 'required')" class="text-danger fs-7 mt-1">Paid amount is required.</div>
          <div *ngIf="hasError('paidAmount', 'min')" class="text-danger fs-7 mt-1">Amount must be greater than zero.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Payment Method</label>
          <select class="form-select form-select-solid" formControlName="paymentMethod"
            [class.is-invalid]="isInvalid('paymentMethod')">
            <option value="0">Select Method</option>
            <option *ngFor="let opt of paymentMethodOptions" [value]="opt.id">{{ opt.label }}</option>
          </select>
          <div *ngIf="isInvalid('paymentMethod')" class="text-danger fs-7 mt-1">Payment method is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Transaction ID</label>
          <input type="text" class="form-control form-control-solid" formControlName="transactionId"
            placeholder="bKash/bank transaction reference" />
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm me-3" (click)="cancel()">Cancel</button>
    <button type="button" class="btn btn-primary btn-sm" (click)="save()" [disabled]="isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
