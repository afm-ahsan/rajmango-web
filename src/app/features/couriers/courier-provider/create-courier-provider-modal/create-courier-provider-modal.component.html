<div class="modal-content">
  <!-- Header -->
  <div class="modal-header">
    <h5 class="modal-title whiteFontColor" id="example-modal-sizes-title-lg">
      {{ courierProviderDto?.id ? 'Edit Courier Provider' : 'Add Courier Provider' }}
    </h5>
  </div>

  <!-- Body with Loader -->
  <div class="modal-body overlay overlay-block cursor-default">
    <ng-container *ngIf="isLoading">
      <div class="overlay-layer bg-transparent">
        <div class="spinner spinner-lg spinner-success"></div>
      </div>
    </ng-container>

    <!-- Form -->
    <form *ngIf="courierProviderDto" [formGroup]="formGroup" class="form">

      <!-- Name (required) -->
      <div class="form-group row mb-3">
        <label for="name" class="col-3 col-form-label text-lg-right">
          <strong>Name <span class="text-danger">*</span>:</strong>
        </label>
        <div class="col-9">
          <input
            id="name"
            type="text"
            class="form-control"
            formControlName="name"
            placeholder="Courier Provider Name"
            [class.is-invalid]="isControlInvalid('name')"
            [class.is-valid]="isControlValid('name')" />
          <div *ngIf="isControlValid('name')" class="valid-feedback">Name looks good</div>
          <div *ngIf="controlHasError('required', 'name')" class="invalid-feedback">Name is required</div>
          <div *ngIf="controlHasError('maxlength', 'name')" class="invalid-feedback">Max 100 characters allowed</div>
        </div>
      </div>

      <!-- Description (optional) -->
      <div class="form-group row mb-3">
        <label for="description" class="col-3 col-form-label text-lg-right">
          <strong>Description:</strong>
        </label>
        <div class="col-9">
          <textarea
            id="description"
            class="form-control"
            rows="3"
            formControlName="description"
            placeholder="Courier Provider Description">
          </textarea>
        </div>
      </div>

      <!-- Support Phone (optional) -->
      <div class="form-group row mb-3">
        <label for="supportPhone" class="col-3 col-form-label text-lg-right">
          <strong>Support Phone:</strong>
        </label>
        <div class="col-9">
          <input
            id="supportPhone"
            type="text"
            class="form-control"
            formControlName="supportPhone"
            placeholder="Phone Number" />
        </div>
      </div>

      <!-- Email (optional with validation) -->
      <div class="form-group row mb-3">
        <label for="email" class="col-3 col-form-label text-lg-right">
          <strong>Email:</strong>
        </label>
        <div class="col-9">
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="Email address"
            [class.is-invalid]="controlHasError('email', 'email')" />
          <div *ngIf="controlHasError('email', 'email')" class="invalid-feedback">Invalid email format</div>
        </div>
      </div>

      <!-- Is Active (toggle) -->
      <div class="form-group row align-items-center mb-3">
        <label for="isActive" class="col-3 col-form-label text-lg-right">
          <strong>Is Active:</strong>
        </label>
        <div class="col-9">
          <div class="form-check form-switch">
            <input
              id="isActive"
              type="checkbox"
              class="form-check-input"
              formControlName="isActive" />
            <label class="form-check-label ms-2" for="isActive">
              {{ formGroup.get('isActive')?.value ? 'Yes' : 'No' }}
            </label>
          </div>
        </div>
      </div>

    </form>
  </div>

  <!-- Footer -->
  <div class="modal-footer justify-content-end">
    <button type="button" class="btn btn-light d-flex align-items-center" (click)="modal.dismiss()">
      <i class="bi bi-x-circle me-2 fs-5 text-danger"></i>
      Cancel
    </button>
    <button type="button" class="btn btn-primary d-flex align-items-center" (click)="save()" [disabled]="formGroup.invalid">
      <i class="bi bi-save me-2 fs-5"></i>
      Save
    </button>
  </div>
</div>
