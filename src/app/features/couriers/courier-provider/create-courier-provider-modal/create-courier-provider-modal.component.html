<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{ courierProviderDto.id ? 'Edit Courier Provider' : 'Add Courier Provider' }}</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <form *ngIf="!isLoading" [formGroup]="formGroup">
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Name</label>
          <input type="text" class="form-control form-control-solid" formControlName="name"
            placeholder="Courier provider name" />
          <div *ngIf="controlHasError('required', 'name')" class="text-danger fs-7 mt-1">Name is required.</div>
          <div *ngIf="controlHasError('maxlength', 'name')" class="text-danger fs-7 mt-1">Name must be at most 100 characters.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Support Phone</label>
          <input type="text" class="form-control form-control-solid" formControlName="supportPhone"
            placeholder="Phone number" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control form-control-solid" formControlName="email"
            placeholder="Email address" />
          <div *ngIf="controlHasError('email', 'email')" class="text-danger fs-7 mt-1">Please enter a valid email.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control form-control-solid" formControlName="description"
            placeholder="Optional description" rows="3"></textarea>
        </div>
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" formControlName="isActive" id="isActiveCheck" />
            <label class="form-check-label fw-semibold" for="isActiveCheck">Active</label>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light me-3" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="save()" [disabled]="formGroup.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
