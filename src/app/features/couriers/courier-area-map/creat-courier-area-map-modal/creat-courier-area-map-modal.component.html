<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{ courierAreaMapDto.id ? 'Edit Courier Area Map' : 'Add Courier Area Map' }}</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <form *ngIf="!isLoading" [formGroup]="formGroup">
      <div class="row g-4">
        <div class="col-12">
          <label class="form-label fw-semibold required">Courier Station</label>
          <select class="form-select form-select-solid" formControlName="courierStationId"
            [class.is-invalid]="isControlInvalid('courierStationId')">
            <option value="0" disabled>Select a courier station</option>
            <option *ngFor="let station of courierStationOptions" [value]="station.id">{{ station.name }}</option>
          </select>
          <div *ngIf="controlHasError('required', 'courierStationId')" class="text-danger fs-7 mt-1">Courier station is required.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold required">Area</label>
          <input type="text" class="form-control form-control-solid" formControlName="area"
            placeholder="Area name" [class.is-invalid]="isControlInvalid('area')" />
          <div *ngIf="controlHasError('required', 'area')" class="text-danger fs-7 mt-1">Area is required.</div>
          <div *ngIf="controlHasError('maxlength', 'area')" class="text-danger fs-7 mt-1">Area must be at most 100 characters.</div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm me-3" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary btn-sm" (click)="save()" [disabled]="formGroup.invalid || isSubmitting">
      <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
