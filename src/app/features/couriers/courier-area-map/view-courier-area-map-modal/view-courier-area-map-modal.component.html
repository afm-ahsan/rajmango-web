<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">Courier Area Map Details</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <div *ngIf="!isLoading && courierAreaMapDto" class="row g-4">
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Area</div>
        <div class="fw-semibold fs-6">{{ courierAreaMapDto.area || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Courier Station</div>
        <div class="fw-semibold fs-6">{{ courierAreaMapDto.courierStationName || '—' }}</div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm" (click)="modal.dismiss()">Close</button>
  </div>
</div>
