<!--begin::Courier AreaMap List-->
<div class="post d-flex flex-column-fluid" id="kt_courier_areaMap">
  <div id="kt_content_container" class="container-xxl">
    <div class="card">

      <!--begin::Header-->
      <div class="card-header border-0 pt-6 justify-content-between align-items-center">
        <!-- Search -->
        <div class="card-title">
          <div class="d-flex align-items-center position-relative">
            <i class="bi bi-search fs-3 position-absolute ms-3 text-muted"></i>
            <input
              type="search"
              class="form-control form-control-solid w-250px ps-10"
              placeholder="Search Courier AreaMap"
              (input)="onSearchChange($event)"
            />
          </div>
        </div>

        <!-- Toolbar -->
        <div>
          <button type="button" class="btn btn-sm btn-primary" (click)="create()">
            <i class="bi bi-plus-circle me-2"></i>
            Add Courier Area Map
          </button>
        </div>
      </div>
      <!--end::Header-->

      <!--begin::Body-->
      <div class="card-body py-4" *ngIf="courierAreaMaps.length > 0">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle fs-6 gy-1">
                <thead>
                    <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                    <th class="text-nowrap" (click)="onSort('area')">
                    <span class="d-flex align-items-center gap-1">
                        <i class="bi bi-fonts text-primary me-1"></i>
                        Area
                        <span *ngIf="filter.sortBy === 'area'">{{ filter.sortOrder === 'asc' ? '▲' : '▼' }}</span>
                    </span>
                    </th>
                    <th class="text-nowrap" (click)="onSort('courierStationName')">
                    <span class="d-flex align-items-center gap-1">
                        <i class="bi bi-building text-secondary fs-5"></i> Courier Station Name
                        <span *ngIf="filter.sortBy === 'courierStationName'">{{ filter.sortOrder === 'asc' ? '▲' : '▼' }}</span>
                    </span>
                    </th>                    
                    <th class="text-center text-nowrap" style="width: 80px;">Actions</th>
                </tr>
            </thead>
            <tbody class="text-gray-600 fw-semibold">
              <tr *ngFor="let areaMap of courierAreaMaps">
                <td>
                  <a href="javascript:void(0)" (click)="view(areaMap.id)" class="text-hover-primary">
                    {{ areaMap.area }}
                  </a>
                </td>
                <td>{{ areaMap.courierStationName }}</td>
                <td class="text-center">
                  <button type="button" class="btn btn-light btn-sm" data-kt-menu-trigger="click" data-kt-menu-placement="bottom-end">
                    Actions <i class="bi bi-three-dots-vertical ms-1"></i>
                  </button>
                  <div class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-bold fs-7 w-125px py-4" data-kt-menu="true">
                    <div class="menu-item px-3">
                      <a class="menu-link px-3" (click)="edit(areaMap.id)">
                        <i class="bi bi-pencil-square me-2 text-primary"></i>Edit
                      </a>
                    </div>
                    <div class="menu-item px-3">
                      <a class="menu-link px-3" (click)="view(areaMap.id)">
                        <i class="bi bi-eye me-2 text-info"></i>View
                      </a>
                    </div>
                    <div class="menu-item px-3">
                      <a class="menu-link px-3 text-danger" (click)="delete(areaMap.id)">
                        <i class="bi bi-trash me-2"></i>Delete
                      </a>
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <app-pagination
          [collectionSize]="totalCount"
          [pageSize]="filter.pageSize"
          [pageNumber]="filter.pageNumber"
          (pageChange)="pageChanged($event)"
          (pageSizeChange)="pageSizeChanged($event)">
        </app-pagination>
      </div>
      <!--end::Body-->

      <!--begin::No Data Component-->
      <div class="card-body" *ngIf="!courierAreaMaps.length && !isLoading">
        <app-data-empty
          icon="bi-truck"
          title="No Courier Area Map Found"
          message="Try adjusting your search or add a new area map to get started."
          buttonText="Add Courier Area Map"
          (buttonClick)="create()">
        </app-data-empty>
      </div>
      <!--end::No Data Component-->

    </div>
  </div>
</div>
<!--end::Courier AreaMap List-->
