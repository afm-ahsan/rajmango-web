<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">Delete Courier Rate Config</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8 text-center">
    <i class="bi bi-exclamation-triangle-fill text-danger fs-2hx mb-3 d-block"></i>
    <p class="fs-6 text-gray-600 mb-0">Are you sure you want to delete this courier rate configuration?</p>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm me-3" (click)="modal.dismiss()" [disabled]="isLoading">Cancel</button>
    <button type="button" class="btn btn-danger btn-sm" (click)="delete()" [disabled]="isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Delete
    </button>
  </div>
</div>
