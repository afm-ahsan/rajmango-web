<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{ courierStationDto.id ? 'Edit Courier Station' : 'Add Courier Station' }}</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <form *ngIf="!isLoading" [formGroup]="formGroup">
      <div class="row g-4">
        <div class="col-12">
          <label class="form-label fw-semibold required">Courier Provider</label>
          <select class="form-select form-select-solid" formControlName="courierProviderId"
            [class.is-invalid]="isControlInvalid('courierProviderId')">
            <option value="0" disabled>Select a courier provider</option>
            <option *ngFor="let provider of courierProviderOptions" [value]="provider.id">{{ provider.name }}</option>
          </select>
          <div *ngIf="controlHasError('required', 'courierProviderId')" class="text-danger fs-7 mt-1">Provider is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Station Name</label>
          <input type="text" class="form-control form-control-solid" formControlName="name"
            placeholder="Courier station name" [class.is-invalid]="isControlInvalid('name')" />
          <div *ngIf="controlHasError('required', 'name')" class="text-danger fs-7 mt-1">Name is required.</div>
          <div *ngIf="controlHasError('maxlength', 'name')" class="text-danger fs-7 mt-1">Name must be at most 100 characters.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control form-control-solid" formControlName="email"
            placeholder="example@email.com" [class.is-invalid]="controlHasError('email', 'email')" />
          <div *ngIf="controlHasError('email', 'email')" class="text-danger fs-7 mt-1">Invalid email.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Primary Phone</label>
          <input type="text" class="form-control form-control-solid" formControlName="supportPhone1"
            placeholder="Primary phone" [class.is-invalid]="isControlInvalid('supportPhone1')" />
          <div *ngIf="controlHasError('required', 'supportPhone1')" class="text-danger fs-7 mt-1">Primary phone is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Alternate Phone</label>
          <input type="text" class="form-control form-control-solid" formControlName="supportPhone2"
            placeholder="Alternate phone (optional)" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">City</label>
          <input type="text" class="form-control form-control-solid" formControlName="city"
            placeholder="City" [class.is-invalid]="isControlInvalid('city')" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Area</label>
          <input type="text" class="form-control form-control-solid" formControlName="area"
            placeholder="Area" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Latitude</label>
          <input type="number" step="any" class="form-control form-control-solid" formControlName="latitude"
            placeholder="e.g. 23.7806" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Longitude</label>
          <input type="number" step="any" class="form-control form-control-solid" formControlName="longitude"
            placeholder="e.g. 90.2792" />
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold required">Address</label>
          <textarea class="form-control form-control-solid" formControlName="addressLine"
            placeholder="Full address" rows="2" [class.is-invalid]="isControlInvalid('addressLine')"></textarea>
          <div *ngIf="controlHasError('required', 'addressLine')" class="text-danger fs-7 mt-1">Address is required.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Google Map URL</label>
          <textarea class="form-control form-control-solid" formControlName="googleMapUrl"
            placeholder="Google Maps link" rows="2"></textarea>
        </div>
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" formControlName="isActive" id="isActiveCheck" />
            <label class="form-check-label fw-semibold" for="isActiveCheck">Active</label>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light me-3" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="save()" [disabled]="formGroup.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
