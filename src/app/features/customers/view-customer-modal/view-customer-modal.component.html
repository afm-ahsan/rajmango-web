<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">Customer Details</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <div *ngIf="!isLoading && customerDto" class="row g-4">
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Name</div>
        <div class="fw-semibold fs-6">{{ customerDto.name || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Phone</div>
        <div class="fw-semibold fs-6">{{ customerDto.phoneNumber || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Email</div>
        <div class="fw-semibold fs-6">{{ customerDto.email || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Customer Type</div>
        <div class="fw-semibold fs-6">{{ customerType || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Status</div>
        <span class="badge" [ngClass]="customerDto.isActive ? 'bg-success' : 'bg-danger'">
          {{ customerDto.isActive ? 'Active' : 'Inactive' }}
        </span>
      </div>
      <div class="col-12">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Address</div>
        <div class="fw-semibold fs-6">{{ customerDto.address || '—' }}</div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm" (click)="modal.dismiss()">Close</button>
  </div>
</div>
