<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4 whiteFontColor" id="example-modal-sizes-title-lg">
            <ng-container *ngIf="customerDto">
                <ng-container *ngIf="customerDto.id" class="font-weight-bold"><strong>Edit
                        Customer</strong></ng-container>
                <ng-container *ngIf="!customerDto.id" class="font-weight-bold"><strong>Add
                        Customer</strong></ng-container>
            </ng-container>
        </div>
    </div>
    <div class="overlay overlay-block cursor-default modal-body">
        <ng-container *ngIf="isLoading">
            <div class="overlay-layer bg-transparent">
                <div class="spinner spinner-lg spinner-success"></div>
            </div>
        </ng-container>
        <ng-container *ngIf="customerDto">
            <form action="#" class="form form-label-right" [formGroup]="formGroup">
                <!-- Customer Name -->
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Name<span
                                class="text-danger">*</span>:</b></label>
                    <div class="col-9">
                        <input type="text" class="form-control form-control-lg form-control-solid" name="name"
                            placeholder="Customer Name" autocomplete="off"
                            [class.is-invalid]="isControlInvalid('name')" [class.is-valid]="isControlValid('name')"
                            formControlName="name" />
                        <div class="invalid-feedback" *ngIf="controlHasError('required', 'name')">
                            Customer name is required
                        </div>
                        <div class="invalid-feedback" *ngIf="controlHasError('minlength', 'name')">
                            Customer name should have at least 2 characters
                        </div>
                        <div class="invalid-feedback" *ngIf="controlHasError('maxlength', 'name')">
                            Customer name should have maximum 50 characters
                        </div>
                    </div>
                </div>
                <!-- Customer Phone -->
                <div class="form-group row mt-2">
                    <label class="col-3 col-form-label text-lg-right"><b>Phone:</b></label>
                    <div class="col-9">
                        <input type="text" class="form-control form-control-lg form-control-solid" name="phoneNumber"
                            placeholder="Phone Number" autocomplete="off" formControlName="phoneNumber" />
                    </div>
                </div>
                <!-- Customer Email -->
                <div class="form-group row mt-2">
                    <label class="col-3 col-form-label text-lg-right"><b>Email:</b></label>
                    <div class="col-9">
                        <input type="text" class="form-control form-control-lg form-control-solid" name="email"
                            placeholder="Email Id" autocomplete="off" formControlName="email" />
                    </div>
                </div>
                <!-- Customer Address -->
                <div class="form-group row mt-2">
                    <label class="col-3 col-form-label text-lg-right"><b>Address:</b></label>
                    <div class="col-9">
                        <textarea class="form-control form-control-lg form-control-solid" name="address"
                            placeholder="Address" autocomplete="off" formControlName="address">
                        </textarea>
                    </div>
                </div>
                <!-- Customer Type -->
                <div class="form-group row mt-2">
                    <label class="col-3 col-form-label text-lg-right"><b>Customer Type:</b></label>
                    <div class="col-9">
                        <select class="form-control form-select form-select-solid" name="customerType" formControlName="customerType">
                            <option value="0">Select a Customer Type</option>
                            <option *ngFor="let customerType of ddlCustomerTypes" value="{{ customerType.id }}">
                                {{customerType.label }}
                            </option>
                        </select>
                    </div>
                </div>
                <!-- Is Active -->
                <div class="form-group row mt-2">
                    <label class="col-3 col-form-label text-lg-right"><b>Is Active:</b></label>
                    <div class="col-9 mt-4">
                        <input type="checkbox" formControlName="isActive" />
                    </div>
                </div>
            </form>
        </ng-container>
    </div>
    <div class="modal-footer">
        <button class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <button class="btn btn-primary btn-elevate" (click)="save()" [disabled]="formGroup.invalid">Save</button>
    </div>
</div>
