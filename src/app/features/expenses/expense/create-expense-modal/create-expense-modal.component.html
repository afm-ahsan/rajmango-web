<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{ expenseDto.id ? 'Edit Expense' : 'Add Expense' }}</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <form *ngIf="!isLoading" [formGroup]="formGroup">
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Name</label>
          <input type="text" class="form-control form-control-solid" formControlName="name"
            placeholder="Expense name" autocomplete="off" />
          <div *ngIf="controlHasError('required', 'name')" class="text-danger fs-7 mt-1">Name is required.</div>
          <div *ngIf="controlHasError('minlength', 'name')" class="text-danger fs-7 mt-1">Name must be at least 2 characters.</div>
          <div *ngIf="controlHasError('maxlength', 'name')" class="text-danger fs-7 mt-1">Name must be at most 50 characters.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Amount</label>
          <input type="number" class="form-control form-control-solid" formControlName="amount"
            placeholder="0.00" autocomplete="off" />
          <div *ngIf="controlHasError('required', 'amount')" class="text-danger fs-7 mt-1">Amount is required.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold required">Expense Type</label>
          <select class="form-select form-select-solid" formControlName="expenseTypeId">
            <option value="">Select an expense type</option>
            <option *ngFor="let item of ddlExpenseTypes" value="{{ item.id }}">{{ item.label }}</option>
          </select>
          <div *ngIf="formControl.expenseTypeId.touched && formControl.expenseTypeId.errors?.required"
            class="text-danger fs-7 mt-1">Expense type is required.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          <input type="text" class="form-control form-control-solid" formControlName="description"
            placeholder="Optional description" autocomplete="off" />
        </div>
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" formControlName="isActive" id="isActiveCheck" />
            <label class="form-check-label fw-semibold" for="isActiveCheck">Active</label>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm me-3" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary btn-sm" (click)="save()" [disabled]="formGroup.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
