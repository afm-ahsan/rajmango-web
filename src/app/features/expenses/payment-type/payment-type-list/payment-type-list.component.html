<!--begin::Payment Method List-->
<div class="post d-flex flex-column-fluid" id="kt_payment_type">
  <div id="kt_content_container" class="container-xxl">
    <div class="card">

      <!--begin::Header-->
      <div class="card-header border-0 pt-6 justify-content-between align-items-center gap-3">
        <div class="card-title">
          <div class="d-flex align-items-center position-relative">
            <i class="bi bi-search fs-3 position-absolute ms-3 text-muted"></i>
            <input
              type="search"
              class="form-control form-control-solid w-100 w-sm-250px ps-10"
              placeholder="Search Payment Method"
              (input)="onSearchChange($event)"
            />
          </div>
        </div>
        <div class="card-toolbar">
          <button type="button" class="btn btn-sm btn-primary" (click)="create()">
            <i class="bi bi-plus-circle me-2"></i>Add Payment Method
          </button>
        </div>
      </div>
      <!--end::Header-->

      <!--begin::Loading-->
      <div class="card-body d-flex justify-content-center align-items-center" *ngIf="isLoading" style="min-height: 200px;">
        <span class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </span>
      </div>
      <!--end::Loading-->

      <!--begin::Body-->
      <div class="card-body py-4" *ngIf="!isLoading && paymentMethods.length > 0">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle fs-6 gy-5">
            <thead>
              <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                <th>Name</th>
                <th>Description</th>
                <th>Active</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody class="text-gray-600 fw-semibold">
              <tr *ngFor="let method of paymentMethods">
                <td>
                  <a href="javascript:void(0)" (click)="view(method.id)" class="text-gray-800 text-hover-primary">
                    {{ method.name }}
                  </a>
                </td>
                <td>{{ method.description }}</td>
                <td>
                  <span class="badge" [ngClass]="method.isActive ? 'bg-success' : 'bg-danger'">
                    {{ method.isActive ? 'Yes' : 'No' }}
                  </span>
                </td>
                <td class="text-center">
                  <button type="button" class="btn btn-light btn-sm" data-kt-menu-trigger="click" data-kt-menu-placement="bottom-end">
                    Actions <i class="bi bi-three-dots-vertical ms-2"></i>
                  </button>
                  <div class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-bold fs-7 w-125px py-4" data-kt-menu="true">
                    <div class="menu-item px-3">
                      <a class="menu-link px-3" (click)="edit(method.id)">
                        <i class="bi bi-pencil-square me-2 text-primary"></i>Edit
                      </a>
                    </div>
                    <div class="menu-item px-3">
                      <a class="menu-link px-3" (click)="view(method.id)">
                        <i class="bi bi-eye me-2 text-info"></i>View
                      </a>
                    </div>
                    <div class="menu-item px-3">
                      <a class="menu-link px-3 text-danger" (click)="delete(method.id)">
                        <i class="bi bi-trash me-2"></i>Delete
                      </a>
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <app-pagination
          [collectionSize]="totalCount"
          [pageSize]="filter.pageSize"
          [pageNumber]="filter.pageNumber"
          (pageChange)="pageChanged($event)"
          (pageSizeChange)="pageSizeChanged($event)">
        </app-pagination>
      </div>
      <!--end::Body-->

      <!--begin::Empty-->
      <div class="card-body" *ngIf="!isLoading && !paymentMethods.length">
        <app-data-empty
          icon="bi-credit-card"
          title="No Payment Methods Found"
          message="Try adjusting your search or add a new payment method to get started."
          buttonText="Add Payment Method"
          (buttonClick)="create()">
        </app-data-empty>
      </div>
      <!--end::Empty-->

    </div>
  </div>
</div>
<!--end::Payment Method List-->
