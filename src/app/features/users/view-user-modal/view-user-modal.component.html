<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">User Details</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <div *ngIf="!isLoading && userDto" class="row g-4">
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Username</div>
        <div class="fw-semibold fs-6">{{ userDto.userName || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Email</div>
        <div class="fw-semibold fs-6">{{ userDto.email || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">First Name</div>
        <div class="fw-semibold fs-6">{{ userDto.firstName || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Last Name</div>
        <div class="fw-semibold fs-6">{{ userDto.lastName || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Phone</div>
        <div class="fw-semibold fs-6">{{ userDto.phoneNumber || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Role</div>
        <div class="fw-semibold fs-6">{{ roleName || '—' }}</div>
      </div>
      <div class="col-12 col-md-6">
        <div class="text-muted fs-7 fw-semibold text-uppercase mb-1">Status</div>
        <span class="badge" [ngClass]="userDto.isActive ? 'bg-success' : 'bg-danger'">
          {{ userDto.isActive ? 'Active' : 'Inactive' }}
        </span>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm" (click)="modal.dismiss()">Close</button>
  </div>
</div>
