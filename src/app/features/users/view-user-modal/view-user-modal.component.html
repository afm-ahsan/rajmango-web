<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4 whiteFontColor" id="example-modal-sizes-title-lg">
            <ng-container *ngIf="userDto">
                <ng-container *ngIf="userDto.id" class="font-weight-bold">
                    <strong>Food User Details</strong>
                </ng-container>
            </ng-container>
        </div>
    </div>
    <div class="overlay overlay-block cursor-default modal-body">
        <ng-container *ngIf="isLoading">
            <div class="overlay-layer bg-transparent">
                <div class="spinner spinner-lg spinner-success"></div>
            </div>
        </ng-container>
        <ng-container *ngIf="userDto">
            <form action="#" class="form form-label-right">
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>User Name:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ userDto.userName }}</label>
                    </div>
                </div>
                <div class="form-group row">
                    <div class="form-group row">
                        <label class="col-3 col-form-label text-lg-right"><b>First Name:</b></label>
                        <div class="col-9">
                            <label class="col-form-label text-lg-left">{{ userDto.firstName }}</label>
                        </div>
                    </div>
                </div>                
                <div class="form-group row">
                    <div class="form-group row">
                        <label class="col-3 col-form-label text-lg-right"><b>Last Name:</b></label>
                        <div class="col-9">
                            <label class="col-form-label text-lg-left">{{ userDto.lastName }}</label>
                        </div>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Email:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ userDto.email }}</label>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Phone:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ userDto.phoneNumber }}</label>
                    </div>
                </div>                
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Role:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ roleName }}</label>
                    </div>
                </div>                
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Is Active:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ userDto.isActive }}</label>
                    </div>
                </div>
            </form>
        </ng-container>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()"><i
                class="fas fa-window-close"></i>Close</button>
    </div>
</div>
