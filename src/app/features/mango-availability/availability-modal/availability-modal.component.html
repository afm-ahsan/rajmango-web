<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{ title }}</h2>
    <button type="button" class="btn-close" (click)="cancel()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <form [formGroup]="form">
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Mango Type</label>
          <select class="form-select form-select-solid" formControlName="mangoTypeId"
            [class.is-invalid]="isInvalid('mangoTypeId')"
            [attr.disabled]="isEdit ? true : null">
            <option [value]="0">-- Select Mango Type --</option>
            <option *ngFor="let opt of mangoTypeOptions" [value]="opt.id">{{ opt.label }}</option>
          </select>
          <div *ngIf="isInvalid('mangoTypeId')" class="text-danger fs-7 mt-1">Mango type is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Season Year</label>
          <input type="number" class="form-control form-control-solid" formControlName="seasonYear"
            [class.is-invalid]="isInvalid('seasonYear')" placeholder="e.g. 2025" />
          <div *ngIf="isInvalid('seasonYear')" class="text-danger fs-7 mt-1">Valid season year is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Start Date</label>
          <input type="date" class="form-control form-control-solid" formControlName="startDate"
            [class.is-invalid]="isInvalid('startDate')" />
          <div *ngIf="isInvalid('startDate')" class="text-danger fs-7 mt-1">Start date is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">End Date</label>
          <input type="date" class="form-control form-control-solid" formControlName="endDate"
            [class.is-invalid]="isInvalid('endDate')" />
          <div *ngIf="isInvalid('endDate')" class="text-danger fs-7 mt-1">End date is required.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Price per Kg (৳)</label>
          <input type="number" class="form-control form-control-solid" formControlName="pricePerKg"
            [class.is-invalid]="isInvalid('pricePerKg')" placeholder="0.00" step="0.01" />
          <div *ngIf="isInvalid('pricePerKg')" class="text-danger fs-7 mt-1">Price per kg must be greater than zero.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Status</label>
          <select class="form-select form-select-solid" formControlName="status"
            [class.is-invalid]="isInvalid('status')">
            <option *ngFor="let opt of statusOptions" [value]="opt.id">{{ opt.label }}</option>
          </select>
          <div *ngIf="isInvalid('status')" class="text-danger fs-7 mt-1">Status is required.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Notes</label>
          <textarea class="form-control form-control-solid" formControlName="notes" rows="3"
            placeholder="Optional notes about this availability record"></textarea>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm me-3" (click)="cancel()" [disabled]="isLoading">Cancel</button>
    <button type="button" class="btn btn-primary btn-sm" (click)="save()" [disabled]="isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
