<div class="modal-content">
  <div class="modal-header">
    <h4 class="modal-title whiteFontColor"><strong>{{ title }}</strong></h4>
  </div>

  <div class="modal-body">
    <form [formGroup]="form">
      <div class="mb-5">
        <label class="form-label required">Address Line</label>
        <input type="text" class="form-control form-control-lg"
          formControlName="addressLine"
          [class.is-invalid]="isInvalid('addressLine')" />
        <div *ngIf="isInvalid('addressLine')" class="invalid-feedback">Address line is required.</div>
      </div>

      <div class="row mb-5">
        <div class="col-md-6 mb-5">
          <label class="form-label required">City</label>
          <input type="text" class="form-control form-control-lg"
            formControlName="city"
            [class.is-invalid]="isInvalid('city')" />
          <div *ngIf="isInvalid('city')" class="invalid-feedback">City is required.</div>
        </div>
        <div class="col-md-6 mb-5">
          <label class="form-label">Area</label>
          <input type="text" class="form-control form-control-lg" formControlName="area" />
        </div>
      </div>

      <div class="row mb-5">
        <div class="col-md-6 mb-5">
          <label class="form-label">Postal Code</label>
          <input type="text" class="form-control form-control-lg" formControlName="postalCode" />
        </div>
        <div class="col-md-6 mb-5">
          <label class="form-label required">Address Type</label>
          <select class="form-select form-select-lg"
            formControlName="addressType"
            [class.is-invalid]="isInvalid('addressType')">
            <option [value]="0">-- Select Type --</option>
            <option *ngFor="let opt of addressTypeOptions" [value]="opt.id">{{ opt.label }}</option>
          </select>
          <div *ngIf="isInvalid('addressType')" class="invalid-feedback">Address type is required.</div>
        </div>
      </div>

      <div class="mb-5 form-check form-switch">
        <input type="checkbox" class="form-check-input" id="isPrimary" formControlName="isPrimary" />
        <label class="form-check-label" for="isPrimary">Set as Primary Address</label>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-light border shadow-sm px-4 me-2"
      (click)="cancel()" [disabled]="isLoading">
      <i class="bi bi-x-lg"></i> Cancel
    </button>
    <button type="button" class="btn btn-primary px-4"
      (click)="save()" [disabled]="isLoading">
      <span *ngIf="!isLoading"><i class="bi bi-check-lg me-1"></i> Save</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </span>
    </button>
  </div>
</div>
