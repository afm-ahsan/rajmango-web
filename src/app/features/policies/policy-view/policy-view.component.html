<div class="container-xxl">

  <!-- Page header -->
  <div class="d-flex align-items-center mb-8">
    <div>
      <h1 class="fw-bold fs-2 mb-1">Policy Centre</h1>
      <p class="text-muted fs-6 mb-0">Browse our policies, terms, and guidelines.</p>
    </div>
  </div>

  <!-- Card grid -->
  <div class="row g-5">
    <div class="col-12 col-sm-6 col-lg-4" *ngFor="let card of cards">
      <div class="card h-100 ph-card">
        <div class="card-body p-7 d-flex flex-column">

          <!-- Icon badge -->
          <div class="ph-icon mb-5">
            <i [class]="'bi ' + card.icon"></i>
          </div>

          <!-- Title -->
          <h4 class="fw-bold fs-5 mb-2">{{ card.title }}</h4>

          <!-- Description -->
          <p class="text-muted fs-7 flex-grow-1 mb-6">{{ card.description }}</p>

          <!-- Action — external (T&C opens in new tab) -->
          <a
            *ngIf="card.external"
            [href]="card.external"
            target="_blank"
            rel="noopener noreferrer"
            class="btn btn-light-primary btn-sm align-self-start">
            Read Policy&nbsp;<i class="bi bi-box-arrow-up-right fs-8"></i>
          </a>

          <!-- Action — internal route -->
          <a
            *ngIf="card.route"
            [routerLink]="['/policies/view', card.route]"
            class="btn btn-light-primary btn-sm align-self-start">
            Read Policy&nbsp;<i class="bi bi-arrow-right fs-8"></i>
          </a>

        </div>
      </div>
    </div>
  </div>

</div>
