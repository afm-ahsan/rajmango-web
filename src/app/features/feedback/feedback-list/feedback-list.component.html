<div class="post d-flex flex-column-fluid">
  <div class="container-xxl">
    <div class="card">
      <div class="card-header border-0 pt-6">
        <div class="card-title">
          <h3 class="card-label fw-bold fs-5">All Customer Feedback</h3>
        </div>
      </div>

      <div class="card-body py-4">

        <div *ngIf="isLoading" class="d-flex justify-content-center py-10">
          <span class="spinner-border text-primary" role="status"></span>
        </div>

        <ng-container *ngIf="!isLoading">
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle fs-6 gy-5">
              <thead>
                <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                  <th>Order #</th>
                  <th>Customer</th>
                  <th>Rating</th>
                  <th>Note</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody class="text-gray-600 fw-bold">
                <tr *ngFor="let fb of feedbacks">
                  <td class="fw-bold">{{ fb.orderNumber }}</td>
                  <td>{{ fb.customerName }}</td>
                  <td>
                    <span *ngFor="let s of stars(fb.rating)" class="text-warning fs-5">&#9733;</span>
                    <span class="ms-1 text-muted fs-7">({{ fb.rating }}/5)</span>
                  </td>
                  <td>{{ fb.note || '—' }}</td>
                  <td>{{ fb.createdAt | date:'dd MMM yyyy' }}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <ng-container *ngIf="!feedbacks.length">
            <div class="text-center text-muted py-10">No feedback submitted yet.</div>
          </ng-container>
        </ng-container>

      </div>
    </div>
  </div>
</div>
