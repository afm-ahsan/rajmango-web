<!--begin::Feedback List-->
<div class="post d-flex flex-column-fluid" id="kt_feedback">
  <div id="kt_content_container" class="container-xxl">
    <div class="card">

      <!--begin::Header-->
      <div class="card-header border-0 pt-6 justify-content-between align-items-center gap-3">
        <div class="card-title">
          <h3 class="card-label fw-bold fs-3 mb-0">Customer Feedback</h3>
        </div>
      </div>
      <!--end::Header-->

      <!--begin::Loading-->
      <div class="card-body d-flex justify-content-center align-items-center" *ngIf="isLoading" style="min-height: 200px;">
        <span class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </span>
      </div>
      <!--end::Loading-->

      <!--begin::Body-->
      <div class="card-body py-4" *ngIf="!isLoading && feedbacks.length > 0">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle fs-6 gy-5">
            <thead>
              <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                <th>Order #</th>
                <th>Customer</th>
                <th>Rating</th>
                <th>Note</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody class="text-gray-600 fw-semibold">
              <tr *ngFor="let fb of feedbacks">
                <td class="fw-bold">{{ fb.orderNumber }}</td>
                <td>{{ fb.customerName }}</td>
                <td>
                  <span *ngFor="let s of stars(fb.rating)" class="text-warning fs-5">&#9733;</span>
                  <span class="ms-1 text-muted fs-7">({{ fb.rating }}/5)</span>
                </td>
                <td>{{ fb.note || '—' }}</td>
                <td>{{ fb.createdAt | date:'dd MMM yyyy' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <!--end::Body-->

      <!--begin::Empty-->
      <div class="card-body" *ngIf="!isLoading && !feedbacks.length">
        <app-data-empty
          icon="bi-chat-square-heart"
          title="No Feedback Yet"
          message="Customer feedback will appear here once submitted.">
        </app-data-empty>
      </div>
      <!--end::Empty-->

    </div>
  </div>
</div>
<!--end::Feedback List-->
