<div class="d-flex flex-column flex-root">
  <div class="d-flex flex-column flex-center flex-column-fluid py-10 px-6">
    <div class="card shadow-sm text-center p-10" style="max-width: 480px; width: 100%;">

      <div class="mb-6">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
      </div>

      <h2 class="fw-bold text-gray-800 mb-3">Payment Successful!</h2>

      <p class="text-gray-600 fs-6 mb-8">
        Your bKash payment was completed successfully.
        Your order will be confirmed shortly.
      </p>

      <button type="button" class="btn btn-primary btn-sm" (click)="goToOrders()">
        <i class="bi bi-bag-check me-2"></i>Go to My Orders
      </button>

    </div>
  </div>
</div>
