<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4 whiteFontColor" id="example-modal-sizes-title-lg">
            <ng-container *ngIf="mangoTypeDto">
                <ng-container *ngIf="mangoTypeDto.id" class="font-weight-bold">
                    <strong>Mango Type Details</strong>
                </ng-container>
            </ng-container>
        </div>
    </div>
    <div class="overlay overlay-block cursor-default modal-body">
        <ng-container *ngIf="isLoading">
            <div class="overlay-layer bg-transparent">
                <div class="spinner spinner-lg spinner-success"></div>
            </div>
        </ng-container>
        <ng-container *ngIf="mangoTypeDto">
            <form action="#" class="form form-label-right">
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Name:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ mangoTypeDto.name }}</label>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Description:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ mangoTypeDto.description }}</label>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>PricePerKg:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ mangoTypeDto.pricePerKg }}</label>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Is Available:</b></label>
                    <div class="col-9">
                        <label class="col-form-label text-lg-left">{{ mangoTypeDto.isAvailable? "Yes": "No" }}</label>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-3 col-form-label text-lg-right"><b>Image:</b></label>
                    <div class="col-9">
                        <div *ngIf="mangoTypeDto.imagePath?.length">
                            <div class="overflow-hidden mt-2">
                                <img [src]="createImagePath(mangoTypeDto.imagePath)" alt="MangoType Image" class="rounded preview-image" />
                            </div>       
                        </div>
                    </div>
                </div>                
            </form>
        </ng-container>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()"><i class="fas fa-window-close"></i>Close</button>
    </div>
  </div>
