<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{ mangoTypeDto.id ? 'Edit Mango Type' : 'Add Mango Type' }}</h2>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body py-6 px-lg-8">
    <div *ngIf="isLoading" class="d-flex justify-content-center py-6">
      <span class="spinner-border text-primary" role="status"></span>
    </div>
    <form *ngIf="!isLoading" [formGroup]="formGroup">
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Name</label>
          <input type="text" class="form-control form-control-solid" formControlName="name"
            placeholder="Mango type name" autocomplete="off" />
          <div *ngIf="controlHasError('required', 'name')" class="text-danger fs-7 mt-1">Name is required.</div>
          <div *ngIf="controlHasError('maxlength', 'name')" class="text-danger fs-7 mt-1">Name must be at most 256 characters.</div>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Region</label>
          <input type="text" class="form-control form-control-solid" formControlName="region"
            placeholder="e.g. Rajshahi, Chapai" autocomplete="off" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Avg. Weight</label>
          <input type="text" class="form-control form-control-solid" formControlName="averageWeight"
            placeholder="e.g. 300g - 500g" autocomplete="off" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold">Grade</label>
          <select class="form-select form-select-solid" formControlName="mangoGrade">
            <option *ngFor="let g of gradeOptions" [value]="g.id">{{ g.label }}</option>
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold required">Sweetness Level</label>
          <select class="form-select form-select-solid" formControlName="sweetnessLevel"
            [class.is-invalid]="isControlInvalid('sweetnessLevel')">
            <option [value]="0" disabled>-- Select sweetness level --</option>
            <option *ngFor="let s of sweetnessLevelOptions" [value]="s.id">{{ s.label }}</option>
          </select>
          <div *ngIf="controlHasError('required', 'sweetnessLevel') || controlHasError('min', 'sweetnessLevel')"
            class="text-danger fs-7 mt-1">Sweetness level is required.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control form-control-solid" formControlName="description"
            placeholder="Mango type description" rows="3"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Image</label>
          <app-upload [location]="location" [entityId]="mangoTypeDto.id || undefined"
            (uploadFinished)="uploadFinished($event)"></app-upload>
          <div *ngIf="mangoTypeDto.imagePath?.length" class="mt-2">
            <img [src]="createImagePath(mangoTypeDto.imagePath || '')" alt="Mango Type Image"
              class="rounded preview-image" />
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light btn-sm me-3" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary btn-sm" (click)="save()" [disabled]="formGroup.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>Save
    </button>
  </div>
</div>
